name: Weekly 4-digit Number

on:
  schedule:
    # 毎週水曜 11:00 UTC = 日本時間 20:00
    - cron: "0 11 * * 3"
  workflow_dispatch: {}

jobs:
  send-number:
    runs-on: ubuntu-latest
    steps:
      - name: Generate 4-digit number
        id: gen
        run: |
          python - << 'PY'
          import random, pathlib
          n = f"{random.randint(1,9999):04d}"
          pathlib.Path("number.txt").write_text(n)
          PY

      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          NUMBER=$(cat number.txt)
          curl -sS -H "Content-Type: application/json" \
            -d "{\"content\":\"${NUMBER}\"}" \
            "$WEBHOOK_URL"
