steps:
  - uses: actions/checkout@v4

  - name: Check schedule and send Discord message
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    run: |
      python3 << 'PY'
      import json
      import random
      import urllib.request
      import os
      from datetime import datetime
      from zoneinfo import ZoneInfo

      DISCORD_WEBHOOK_URL = os.environ["DISCORD_WEBHOOK_URL"]

      now = datetime.now(ZoneInfo("Asia/Tokyo"))

      with open("schedule.json", "r", encoding="utf-8") as f:
          data = json.load(f)

      times = data["times_iso"]
      sent = set(data["sent_iso"])

      due = []

      for t in times:
          dt = datetime.fromisoformat(t)

          print(f"CHECK: {t}")
          print(f"NOW  : {now.isoformat()}")

          if dt <= now and t not in sent:
              due.append(t)

      print(f"DUE_COUNT: {len(due)}")

      if not due:
          print("NO_SEND")
          raise SystemExit(0)

      emojis = [
          "🧊",
          "🪨",
          "🍵",
          "🧱",
          "🪙",
          "📎",
          "🍎",
          "💡",
          "🍰",
          "👐"
      ]

      message = random.choice(emojis)

      print("SEND_TRIGGERED")
      print("MESSAGE:", message)
      print("DUE:", due)

      payload = json.dumps({
          "content": message
      }).encode("utf-8")

      req = urllib.request.Request(
          DISCORD_WEBHOOK_URL,
          data=payload,
          headers={"Content-Type": "application/json"}
      )

      urllib.request.urlopen(req)

      data["sent_iso"].extend(due)

      with open("schedule.json", "w", encoding="utf-8") as f:
          json.dump(data, f, ensure_ascii=False, indent=2)

      print("SENT_OK")
      PY

  - name: Commit sent status
    run: |
      git config user.name github-actions
      git config user.email github-actions@github.com

      git add schedule.json

      git diff --cached --quiet || \
      git commit -m "Update sent status"

      git push
