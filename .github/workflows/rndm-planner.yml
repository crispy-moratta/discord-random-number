name: rndm planner (weekly 7 random times)
on:
  schedule:
    # 月曜 00:00 JST（= 日曜 15:00 UTC）に毎週1回、時刻表を作る
    - cron: "0 15 * * 0"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate schedule.json (7 random 45-min slots within the week)
        run: |
          python - << 'PY'
          import json, random
          from datetime import datetime, timedelta, timezone
          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          week_start = now.replace(hour=0, minute=0, second=0, microsecond=0)
          week_start = week_start - timedelta(days=week_start.weekday())
          total_slots = int((7*24*60)/45)  # 45分刻み
          slots = random.sample(range(total_slots), 7)
          times = sorted(week_start + timedelta(minutes=45*s) for s in slots)
          data = {
              "week_start_iso": week_start.isoformat(),
              "times_iso": [t.isoformat() for t in times],
              "sent_iso": []
          }
          with open("schedule.json", "w") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          PY
      - name: Commit schedule.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add schedule.json
          git commit -m "plan: 7 random send times for the week"
          git push
