      - name: Generate schedule.json (7 random 45-min slots within the week)
        run: |
          python - << 'PY'
          import json, random
          from datetime import datetime, timedelta, timezone

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          week_start = now.replace(hour=0, minute=0, second=0, microsecond=0)
          week_start = week_start - timedelta(days=week_start.weekday())  # 月曜0:00基準

          # 45分刻みの全スロットを作る
          all_slots = int((7*24*60)/45)
          candidates = [week_start + timedelta(minutes=45*s) for s in range(all_slots)]

          # 今より未来のスロットだけ残す（1分のバッファ付き）
          future = [t for t in candidates if t >= now + timedelta(minutes=1)]

          # 週末などで未来が少ない場合は、次週に繰り越して7つ確保
          i = 0
          while len(future) < 7:
              future.append(candidates[i] + timedelta(days=7))
              i += 1

          # 未来スロットからランダムに7つ選択
          times = sorted(random.sample(future, 7))

          # JSONに保存
          data = {
              "week_start_iso": week_start.isoformat(),
              "times_iso": [t.isoformat() for t in times],
              "sent_iso": []
          }

          with open("schedule.json", "w") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          PY
